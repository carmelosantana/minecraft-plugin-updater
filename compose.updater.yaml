services:
  plugin-updater:
    image: ghcr.io/carmelosantana/minecraft-plugin-updater:latest
    pull_policy: always
    restart: "no"
    volumes:
      - minecraft:/minecraft
    environment:
      # Optional for private repositories or higher GitHub API limits.
      GITHUB_TOKEN: "${PLUGIN_UPDATER_GITHUB_TOKEN:-}"

  minecraft:
    depends_on:
      plugin-updater:
        condition: service_completed_successfully

volumes:
  minecraft:

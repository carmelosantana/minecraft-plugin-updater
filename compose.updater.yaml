services:
  plugin-updater:
    build:
      context: ./minecraft-plugin-updater
    restart: "no"
    volumes:
      - minecraft:/minecraft
    environment:
      # Optional for private repositories or higher GitHub API limits.
      GITHUB_TOKEN: "${PLUGIN_UPDATER_GITHUB_TOKEN:-}"

  minecraftbe:
    depends_on:
      plugin-updater:
        condition: service_completed_successfully

volumes:
  minecraft:

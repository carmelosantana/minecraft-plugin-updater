name: Test updater

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Run unit tests
        run: PYTHONPATH=. python -m unittest discover -s tests -v

      - name: Validate manifest
        run: python -m json.tool plugins.json >/dev/null

      - name: Build container
        run: docker build .
